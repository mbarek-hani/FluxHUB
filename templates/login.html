{{define "login"}}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="/static/icons/favicon.svg"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login — FluxHUB</title>
        <link rel="stylesheet" href="/static/css/app.css" />
    </head>
    <body>
        <div class="login-page">
            <div class="login-box">
                <div class="logo">
                    <img
                        src="/static/icons/favicon.svg"
                        alt="Flux logo"
                        width="100"
                    />
                </div>
                <h1>FluxHUB</h1>

                {{if .Error}}
                <div class="login-error">Invalid username or password.</div>
                {{end}}

                <form method="POST" action="/admin/login">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input"
                            required
                            autofocus
                        />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            required
                        />
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Sign in
                    </button>
                </form>
            </div>
        </div>
    </body>
</html>
{{end}}
