{{define "page-content"}}
<div class="top-bar">
    <div>
        <div class="breadcrumb">
            <a href="/admin/plugins">Plugins</a>
            <span class="sep">/</span>
            <a href="/admin/plugins/{{.Plugin.ID}}/review">{{.Plugin.Name}}</a>
            <span class="sep">/</span>
            <span>Diff</span>
        </div>
        <h1 style="margin-top: 4px">Compare Changes</h1>
    </div>
    <div class="btn-group">
        <a href="/admin/plugins/{{.Plugin.ID}}/review" class="btn btn-outline"
            >Review</a
        >
        <a href="/admin/plugins/{{.Plugin.ID}}/browse" class="btn btn-outline"
            >Browse Code</a
        >
    </div>
</div>

<div
    class="content"
    x-data="diffViewer('{{.Plugin.ID}}', {{.TagsJSON}}, '{{.FromRef}}', '{{.ToRef}}')"
>
    <div class="ref-selector" style="gap: 16px">
        <div style="display: flex; align-items: center; gap: 8px">
            <label>Base:</label>
            <select x-model="fromRef" class="form-input" style="width: auto">
                <option value="">Select tag...</option>
                <template x-for="tag in tags" :key="'from-'+tag">
                    <option :value="tag" x-text="tag"></option>
                </template>
                <option value="HEAD">HEAD</option>
            </select>
        </div>

        <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            style="color: var(--text-muted)"
        >
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
        </svg>

        <div style="display: flex; align-items: center; gap: 8px">
            <label>Compare:</label>
            <select x-model="toRef" class="form-input" style="width: auto">
                <option value="">Select tag...</option>
                <template x-for="tag in tags" :key="'to-'+tag">
                    <option :value="tag" x-text="tag"></option>
                </template>
                <option value="HEAD">HEAD</option>
            </select>
        </div>

        <button
            class="btn btn-primary btn-sm"
            @click="loadDiff()"
            :disabled="!fromRef || !toRef || loading"
        >
            <span
                x-show="loading"
                class="spinner"
                style="width: 14px; height: 14px"
            ></span>
            Compare
        </button>

        <span
            x-show="diffStats.files > 0"
            style="color: var(--text-muted); font-size: 13px; margin-left: auto"
        >
            <span x-text="diffStats.files"></span> files changed,
            <span
                style="color: var(--accent-green)"
                x-text="'+' + diffStats.additions"
            ></span>
            <span
                style="color: var(--accent-red)"
                x-text="'-' + diffStats.deletions"
            ></span>
        </span>
    </div>

    <div
        x-show="!diffLoaded && !loading"
        class="panel"
        style="margin-top: 16px"
    >
        <div class="empty-state">
            <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                style="
                    width: 48px;
                    height: 48px;
                    opacity: 0.3;
                    margin-bottom: 16px;
                "
            >
                <path d="M16 3h5v5" />
                <path d="M8 3H3v5" />
                <path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3" />
                <path d="m15 9 6-6" />
            </svg>
            <p>Select two references to compare</p>
        </div>
    </div>

    <div id="diff-output" style="margin-top: 16px"></div>
</div>
{{end}}
