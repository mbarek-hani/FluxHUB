{{define "dev_layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.PageTitle}} — Flux Developer Portal</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="stylesheet" href="/static/css/dev.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="/static/js/app.js"></script>
</head>
<body class="dev-portal">
    <div class="app-layout">
        <aside class="app-sidebar dev-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                    Flux Dev Portal
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/dev/dashboard" class="{{if eq .Active "dashboard"}}active{{end}}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="/dev/submit" class="{{if eq .Active "submit"}}active{{end}}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Submit Plugin
                </a>
                <a href="/dev/profile" class="{{if eq .Active "profile"}}active{{end}}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Profile
                </a>
                <div class="sidebar-divider"></div>
                <a href="/v1/plugins" target="_blank">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    Marketplace
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar dev-avatar">{{.AvatarLetter}}</div>
                    <div>
                        <div style="font-size:13px;color:var(--text-primary)">{{.Username}}</div>
                        <div style="font-size:11px;color:var(--text-muted)">Developer</div>
                    </div>
                </div>
                <form action="/dev/logout" method="POST" style="display:inline">
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </div>
        </aside>

        <main class="app-main">
            {{template "dev-content" .}}
        </main>
    </div>

    <div class="toast-container" id="toasts"></div>
</body>
</html>
{{end}}
